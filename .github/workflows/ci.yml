name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read

jobs:
  # --- Lint the scripts and YAML on every push and PR -----------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: shellcheck (test.sh)
        run: shellcheck test.sh    # preinstalled on ubuntu runners
      - name: yamllint (data/ + .github/)
        run: |
          pipx install yamllint
          yamllint .

  # --- Build the site and validate the HTML on every push and PR -----------
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.162.1   # keep in sync with the version you run locally
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install Hugo (extended)
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78  # v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Set up Go (for htmltest)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: stable

      - name: Install htmltest
        run: go install github.com/wjdp/htmltest@v0.17.0

      - name: Build & test (strict build + htmltest + UX/SEO checks)
        run: bash ./test.sh

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: ./public

  # --- Deploy to GitHub Pages, only on master ------------------------------
  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    # Only one deploy at a time; don't cancel an in-progress deploy. Scoped to
    # this job (not the whole workflow) so PR builds never bump a queued
    # master deploy out of the shared group.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write       # to deploy to Pages
      id-token: write    # to verify the deploy originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
